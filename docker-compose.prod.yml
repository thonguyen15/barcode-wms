# Deploy trên server (192.168.1.254) — pull image từ Docker Hub, KHÔNG build.
# Cần copy file này + .env lên server, rồi:  docker compose -f docker-compose.prod.yml up -d
services:
  wms:
    image: quocdat029x/barcode-wms:latest
    container_name: barcode-wms
    restart: unless-stopped
    pull_policy: always          # luôn kéo bản mới nhất khi `up`
    ports:
      - "3000:3000"
    env_file:
      - .env                     # ⚠️ phải có file .env cùng thư mục trên server
    volumes:
      - exports:/app/public/exports   # persist file QR/tem nhãn
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login.html').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  exports:
