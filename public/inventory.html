<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
  <title>Inventory Exports - WMS</title>
</head>
<body>
  <div class="no-print topbar">
    <div class="nav">
      <a href="/create.html" id="navCreate">Create</a>
      <a href="/list.html" id="navList">List</a>
      <a href="/scan.html" id="navScan">Scan</a>
      <a href="/inventory.html" id="navInventory" class="active">Inventory</a>
      <a href="/settings.html" id="navSettings" style="display:none">Settings</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="card" style="margin-top:0">
    <h2 style="margin-bottom:12px">Báo cáo tồn kho</h2>
    <div class="row" style="gap:10px; margin-bottom:16px">
      <button onclick="load()" style="background:var(--primary); color:white">Làm mới</button>
      <button onclick="testTelegram()" style="background:white; color:var(--text); border:1.5px solid var(--border)">Test Telegram 🚀</button>
      <button onclick="notifyStale()" style="background:#fff7ed; color:#c2410c; border:1.5px solid #fed7aa">Báo cáo tồn >15 ngày ⚠️</button>
    </div>
    
    <div id="status" style="font-size:13px; color:var(--muted); font-weight:500">
      Trạng thái: Đang tải...
    </div>
  </div>

  <div id="box"></div>

<script>
function esc(s){
  return (s??"").toString().replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}
async function logout(){ await fetch("/api/logout",{method:"POST"}); location.href="/login.html"; }

async function checkAuth() {
  const r = await fetch("/api/me"); const j = await r.json();
  if (j.role === 'admin' && j.user === 'tho') {
    document.getElementById("navSettings").style.display = "inline-block";
  } else if (j.role === 'entry') {
    document.getElementById("navCreate").style.display = "none";
    document.getElementById("navScan").style.display = "none";
    document.getElementById("navInventory").style.display = "none";
    location.href = "/list.html";
  }
}
checkAuth();

function setStatus(msg){ document.getElementById("status").textContent = "Trạng thái: " + msg; }

async function testTelegram() {
  if(!confirm("Gửi tin nhắn thử đến Telegram?")) return;
  const r = await fetch("/api/telegram/test", { method: "POST" });
  const j = await r.json();
  alert(j.message || j.error);
}

async function notifyStale() {
  if(!confirm("Gửi báo cáo hàng tồn lâu ngày (>15d) qua Telegram?")) return;
  const r = await fetch("/api/telegram/notify-stale-manual", { method: "POST" });
  const j = await r.json();
  alert(j.message || j.error);
}

async function load(){
  const box = document.getElementById("box");
  setStatus("Đang tải dữ liệu...");
  try{
    const r = await fetch("/api/inventory/exports");
    const res = await r.json();
    const rows = res.rows || [];
    setStatus("Tải thành công");

    if(!rows.length){
      box.innerHTML = `<div class="card" style="text-align:center; color:var(--muted)">Chưa có file export nào.</div>`;
      return;
    }

    box.innerHTML = `
      <div class="card" style="padding:0; overflow:hidden">
        <div style="padding:16px; font-weight:800; border-bottom:1px solid var(--border)">Lịch sử Export CSV</div>
        <div class="table-wrap">
          <table cellpadding="12">
            <thead>
              <tr><th>Ngày</th><th>Tên File</th><th>Người xuất</th><th style="width:100px">Thao tác</th></tr>
            </thead>
            <tbody>
              ${rows.map(x=>`
                <tr>
                  <td style="font-weight:600">${esc(x.date_key)}</td>
                  <td><a href="${esc(x.url)}" target="_blank" style="font-weight:600">${esc(x.filename)}</a></td>
                  <td style="color:var(--muted)">${esc(x.actor)}</td>
                  <td>
                    <button onclick="deleteExport(${x.id}, '${esc(x.filename)}')" style="background:#fee2e2; color:#b91c1c; padding:6px 12px; font-size:12px">Xoá</button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }catch(e){
    box.innerHTML = `<div class="card" style="color:#ef4444">Lỗi: ${esc(e.message)}</div>`;
  }
}

async function deleteExport(id, filename){
  if(!confirm(`Xoá vĩnh viễn file: ${filename}?`)) return;
  const r = await fetch(`/api/inventory/exports/${id}`, { method:"DELETE" });
  if(r.ok) load();
  else alert("Xoá thất bại");
}

load();
</script>
</body>
</html>
